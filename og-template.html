<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>OG Image Template — timbaird.com</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		html, body {
			background: #0f1117;
			font-family: 'Inter', system-ui, sans-serif;
			color: #e8eaed;
		}
		body {
			width: 1200px;
			height: 630px;
			padding: 80px;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			overflow: hidden;
		}
		.brand {
			font-family: 'JetBrains Mono', monospace;
			font-size: 22px;
			color: #6b7280;
			letter-spacing: 0.1em;
			text-transform: uppercase;
		}
		.main {
			display: flex;
			flex-direction: column;
			gap: 28px;
		}
		.accent-bar {
			width: 80px;
			height: 4px;
			background: #14b8a6;
		}
		.name {
			font-size: 140px;
			font-weight: 700;
			letter-spacing: -0.03em;
			line-height: 1;
		}
		.tagline {
			font-family: 'JetBrains Mono', monospace;
			font-size: 32px;
			color: #14b8a6;
			font-weight: 500;
			letter-spacing: 0.02em;
		}
	</style>
</head>
<body>
	<div class="brand">timbaird.com</div>
	<div class="main">
		<div class="accent-bar"></div>
		<div class="name">Tim Baird</div>
		<div class="tagline">Software Developer · XRPL · AI/LLM</div>
	</div>
	<div></div>
</body>
</html>
